<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="60" height="60">
    <!-- Estetoscopio formando un corazón -->
    <path d="M 50 88 C 10 68, 5 35, 25 20 C 35 12, 45 20, 48 25" fill="none" stroke="#3498db" stroke-width="5" stroke-linecap="round"/>
    <path d="M 50 88 C 90 68, 95 35, 75 20 C 65 12, 55 20, 52 25" fill="none" stroke="#3498db" stroke-width="5" stroke-linecap="round"/>
    
    <!-- Auriculares del estetoscopio -->
    <circle cx="48" cy="25" r="3.5" fill="#ffffff"/>
    <circle cx="52" cy="25" r="3.5" fill="#ffffff"/>
    
    <!-- Campana del estetoscopio -->
    <circle cx="50" cy="88" r="6" fill="#e74c3c" stroke="#ffffff" stroke-width="2"/>
    
    <!-- Huella: Dedos -->
    <ellipse cx="34" cy="48" rx="4.5" ry="6.5" transform="rotate(-30 34 48)" fill="#ffffff"/>
    <ellipse cx="43" cy="40" rx="4.5" ry="6.5" transform="rotate(-10 43 40)" fill="#ffffff"/>
    <ellipse cx="57" cy="40" rx="4.5" ry="6.5" transform="rotate(10 57 40)" fill="#ffffff"/>
    <ellipse cx="66" cy="48" rx="4.5" ry="6.5" transform="rotate(30 66 48)" fill="#ffffff"/>
    
    <!-- Huella: Almohadilla principal -->
    <path d="M 36 66 C 36 56, 43 53, 50 53 C 57 53, 64 56, 64 66 C 64 76, 55 79, 50 77 C 45 79, 36 76, 36 66 Z" fill="#ffffff"/>
    
    <!-- Cruz Médica en el centro -->
    <path d="M 48.5 60.5 h 3 v 3 h 3 v 3 h -3 v 3 h -3 v -3 h -3 v -3 h 3 z" fill="#e74c3c"/>
</svg>
